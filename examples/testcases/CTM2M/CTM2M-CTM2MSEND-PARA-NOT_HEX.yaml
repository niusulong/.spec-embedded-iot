# CTM2M-CTM2MSEND-PARA-NOT_HEX.yaml
# 指令: AT+CTM2MSEND=<Data>  (文档 14.6)
# 测试点：Data 字段解码失败（含非十六进制字符）→ +CTM2M ERROR:13（Data 字段解码失败）。
# 用 "0200040G02080A"（含非 hex 字符 G）触发，长度 14（偶数），避免先命中 err 17。
name: CTM2MSEND-数据非十六进制err13(严格字节级)
description: |
  场景前提：设备已上电、AT 口可用。数据格式校验一般在指令受理阶段，不依赖登录态。
  验证目标：AT+CTM2MSEND=0200040G02080A（含非十六进制字符 G，长度 14 偶数以避免先命中 err 17），
    期望返回 <CR><LF>+CTM2M ERROR:13<CR><LF>（Data 字段解码失败）。
    注：+CTM2M ERROR 是业务码，故步骤加 timeout 避免空等。
    不确定性：若设备先校验登录态，未登录时会先返回 err 4 而非 err 13。
  文档依据：14.6 <err> 表 err=13「Data 字段解码失败」。
tags: [CTM2M, CTM2MSEND, PARA, p0]
port: COM5

setup:
  - command: ATE0
    assert: { matches: '^\r\nOK\r\n$' }

steps:
  # 14.6 AT+CTM2MSEND=  含非 hex 字符 G（长度 14 偶数）
  - command: AT+CTM2MSEND=0200040G02080A
    timeout: 1.2
    assert:
      - { name: err13解码失败, matches: '^\r\n\+CTM2M ERROR:13\r\n$' }

teardown:
  - command: ATE0
    assert: { matches: '^\r\nOK\r\n$' }

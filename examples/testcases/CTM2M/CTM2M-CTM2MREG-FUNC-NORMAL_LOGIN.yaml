# CTM2M-CTM2MREG-FUNC-NORMAL_LOGIN.yaml
# 指令: AT+CTM2MREG[=<Lifetime>]  登录物联网开放平台（文档 14.3）
# 测试点：正常登录成功路径——异步指令，以 URC 为真正成功标志，用 wait_urc 让框架等 URC 而非遇 OK 即终结。
# 需 注网 + PDP(XIIC=1) + CTM2MINIT 已设置 + 平台可用。
#
# 完整响应序列（文档 14.3 执行响应格式表 + 14.10）：
#   <CR><LF>OK<CR><LF><CR><LF>+CTM2M:<operation>,<status code><CR><LF>
#   登录成功时实际为两条 URC：
#     +CTM2M:reg,0（登录成功）→ +CTM2M:obsrv,0（订阅成功）
#   OK = 指令受理；reg/obsrv URC 是真正结果，必须断言字节格式与成功码。
#
# wait_urc 用法（更新后的 skill）：本步声明 wait_urc 指向"最后一条决定成功的 URC"（obsrv，订阅成功后
#   state 才到 3）。开启后框架遇 OK 不终结、继续读到匹配该正则的 URC 立即返回，整段 OK+reg+obsrv 进
#   Response.text，可整体断言。
name: CTM2MREG-正常登录成功(严格字节级, 需平台)
description: |
  场景前提：需注网（setup poll 等注网就绪）、需 AT+XIIC=1 建立 PDP 拨号（数据业务前提）、
    需 CTM2MINIT 已正确初始化、需中国电信 CTWing 平台可达。
    本用例为平台依赖型，无平台环境时 steps 会失败，属预期。
  验证目标（异步成功以 URC 为准，用 wait_urc 等到 obsrv URC）：
    1) AT+CTM2MREG 受理返回 OK；
    2) 随后上报 +CTM2M:reg,0（登录成功码 reg=0）；
    3) 随后上报 +CTM2M:obsrv,0（订阅成功码 obsrv=0）；
    4) 最终 AT+CTM2MREG? 返回 state=3（已登录已 Observe）。
    URC 字节格式：冒号后无空格，operation 与 status code 间逗号无空格（据 14.10 格式表）。
  文档依据：14.3 执行响应 <CR><LF>OK<CR><LF><CR><LF>+CTM2M:<operation>,<status code><CR><LF>
    + 14.10 主动上报格式表；<status code> 表 reg=0「已成功登录」、obsrv=0「已成功订阅」；
    <state> 表 state=3「已登录已 Observe」。
tags: [CTM2M, CTM2MREG, FUNC, needs-platform, p0]
port: COM5

setup:
  - command: ATE0
    assert: { matches: '^\r\nOK\r\n$' }
  # 等注网就绪（poll CEREG stat==1 或 5）
  - command: AT+CEREG?
    extract: { nstat: 'CEREG:\s*\d,(\d)' }
    poll:
      until: 'nstat == "1" or nstat == "5"'
      timeout: 60
      interval: 3000
    on_failure: continue
  # 建立 PDP 拨号（数据业务前提）
  - command: AT+XIIC=1
    assert: { matches: '^\r\nOK\r\n$' }
  # 等 PDP 激活（XIIC state==1）
  - command: AT+XIIC?
    extract: { xiic_state: '\+XIIC:\s*(\d)' }
    poll:
      until: 'xiic_state == "1"'
      timeout: 60
      interval: 2000
    on_failure: continue

steps:
  # 14.3 AT+CTM2MREG  执行登录——异步，wait_urc 等 obsrv URC（订阅成功，末态 state=3 的标志）
  - command: AT+CTM2MREG
    wait_urc: '\+CTM2M:obsrv,\d'      # 等到这条 URC 才终结（OK 之后 reg,0 与 obsrv,0 都进 text）
    timeout: 10                        # OK+URC 总等待上限（秒）
    assert:
      - { name: 受理OK, contains: "OK" }
      - { name: reg成功URC, matches: '\r\n\+CTM2M:reg,0\r\n' }
      - { name: obsrv成功URC, matches: '\r\n\+CTM2M:obsrv,0\r\n' }
      - { name: 非reg失败码, not_contains: "+CTM2M:reg,1" }
      - { name: 非obsrv失败码, not_contains: "+CTM2M:obsrv,1" }

  # 14.3 复核最终 state==3（reg+obsrv 两 URC 之后的持久状态）
  - command: AT+CTM2MREG?
    extract: { state: '\+CTM2M:(\d)' }
    assert:
      - { name: 严格格式, matches: '^\r\n\+CTM2M:\d\r\n\r\nOK\r\n$' }
      - { name: state为3, var: state, op: eq, value: "3" }

teardown:
  # 14.5 主动登出，恢复到未登录状态。
  # teardown 不支持 wait_urc/poll（见 control-flow.md 表），故 DEREG 仅按普通指令发（遇 OK 即结），
  # 失败仅记警告不影响用例结果。登出实际在固件侧继续完成；后续用例 setup 会幂等地重建登录态。
  - command: AT+CTM2MDEREG
    timeout: 5
  - command: ATE0
    assert: { matches: '^\r\nOK\r\n$' }

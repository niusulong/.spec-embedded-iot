# CTM2M-CTM2MDEREG-FUNC-PRECONDITION_FAIL_NOT_LOGGED_IN.yaml
# 指令: AT+CTM2MDEREG  (文档 14.5)
# 测试点：未登录平台时执行 DEREg → +CTM2M ERROR:4（不能发出此指令）。
# 这是 CTM2MDEREG 自身的业务前提失败路径，归 FUNC。
name: CTM2MDEREG-未登录登出err4(严格字节级)
description: |
  场景前提：设备已上电、AT 口可用；且处于未登录平台状态（setup 先 DEREg 保证 state=0）。
    无需注网/平台（业务前提校验在指令受理时即拒绝）。
  验证目标：未登录时执行 AT+CTM2MDEREG，期望返回 <CR><LF>+CTM2M ERROR:4<CR><LF>（不能发出此指令）。
    注：+CTM2M ERROR 是业务码，故步骤加 timeout 避免空等。
  文档依据：14.5 <err> 表 err=4「不能发出此指令（终端处于"未登录"状态时，不能发出此请求）」。
tags: [CTM2M, CTM2MDEREG, FUNC, p1]
port: COM5

setup:
  - command: ATE0
    assert: { matches: '^\r\nOK\r\n$' }
  - command: AT+CTM2MDEREG
    timeout: 2
    on_failure: skip
  - command: AT+CTM2MREG?
    extract: { state: '\+CTM2M:(\d)' }
    assert: { contains: "OK" }

steps:
  # 14.5 AT+CTM2MDEREG  未登录时登出
  - command: AT+CTM2MDEREG
    timeout: 1.2
    when: 'state == "0"'
    assert:
      - { name: err4不能发出, matches: '^\r\n\+CTM2M ERROR:4\r\n$' }

teardown:
  - command: ATE0
    assert: { matches: '^\r\nOK\r\n$' }

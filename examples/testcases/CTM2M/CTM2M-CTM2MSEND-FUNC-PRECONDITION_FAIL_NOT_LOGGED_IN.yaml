# CTM2M-CTM2MSEND-FUNC-PRECONDITION_FAIL_NOT_LOGGED_IN.yaml
# 指令: AT+CTM2MSEND=<Data>  (文档 14.6)
# 测试点：未登录(state=0/1/4) 时发送数据 → +CTM2M ERROR:4（不能发出此指令）。
# 文档状态机：state=0/1/4 发送返回 err 4；state=2 返回 err 15（见另一用例）。
name: CTM2MSEND-未登录发送err4(严格字节级)
description: |
  场景前提：设备已上电、AT 口可用；且处于未登录平台状态（setup 先 DEREg 保证 state=0）。
    无需注网/平台（业务前提校验在指令受理时即拒绝）。
  验证目标：未登录(state=0)时执行 AT+CTM2MSEND=<合法hex>，期望返回
    <CR><LF>+CTM2M ERROR:4<CR><LF>（不能发出此指令）。
    注：+CTM2M ERROR 是业务码，故步骤加 timeout 避免空等。
  文档依据：14.6 <err> 表 err=4「不能发出此指令（终端处于"未登录"、"登录中"、"取消登录中"
    状态时不能发送数据）」；附「状态机与 send 权限速查」state=0/1/4 → err 4。
tags: [CTM2M, CTM2MSEND, FUNC, p0]
port: COM5

setup:
  - command: ATE0
    assert: { matches: '^\r\nOK\r\n$' }
  - command: AT+CTM2MDEREG
    timeout: 2
    on_failure: skip
  - command: AT+CTM2MREG?
    extract: { state: '\+CTM2M:(\d)' }
    assert: { contains: "OK" }

steps:
  # 14.6 AT+CTM2MSEND=  未登录时发送（state=0 → err 4）
  - command: AT+CTM2MSEND=02000400020805
    timeout: 1.2
    when: 'state == "0" or state == "1" or state == "4"'
    assert:
      - { name: err4不能发出, matches: '^\r\n\+CTM2M ERROR:4\r\n$' }

teardown:
  - command: ATE0
    assert: { matches: '^\r\nOK\r\n$' }

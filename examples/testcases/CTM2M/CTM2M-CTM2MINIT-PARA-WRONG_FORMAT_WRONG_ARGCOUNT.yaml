# CTM2M-CTM2MINIT-PARA-WRONG_FORMAT_WRONG_ARGCOUNT.yaml
# 指令: AT+CTM2MINIT=...  (文档 14.2)
# 测试点：参数数量错误（缺参数，只给 4 个而非必须的 5 个）→ +CTM2M ERROR:2（参数数量错误）。
name: CTM2MINIT-参数数量错误err2(严格字节级)
description: |
  场景前提：设备已上电、AT 口可用。CTM2MINIT 掉电保存，setup extract 初始值，teardown 恢复。
  验证目标：AT+CTM2MINIT 只给 4 个参数（缺 Securitymode），期望返回 <CR><LF>+CTM2M ERROR:2<CR><LF>（参数数量错误）。
    注：+CTM2M ERROR 是业务码，故步骤加 timeout 避免空等。
  文档依据：14.2 命令格式表「执行」必填 5 参数（IP,Port,lifetime,Binding,Security），PSKID/PSK 可选；
    错误码表 err=2「参数数量错误」；响应格式 <CR><LF>+CTM2M ERROR:<err><CR><LF>。
tags: [CTM2M, CTM2MINIT, PARA, p1]
port: COM5

setup:
  - command: ATE0
    assert: { matches: '^\r\nOK\r\n$' }
  - command: AT+CTM2MINIT?
    extract:
      init_ip: '\+CTM2MINIT:"?((?:\d+\.){3}\d+)"?'
      init_port: '\+CTM2MINIT:[^,]*,\s*(\d+)'
      init_life: '\+CTM2MINIT:[^,]*,\s*\d+,(\d+)'
      init_bm: '\+CTM2MINIT:[^,]*,\s*\d+,\d+,(\d)'
      init_sm: '\+CTM2MINIT:[^,]*,\s*\d+,\d+,\d+,(\d)'
    assert: { contains: "OK" }

steps:
  # 14.2 AT+CTM2MINIT=  只给 4 个参数（缺第 5 个 Securitymode；IP/Port 合法上下文用 env）
  - command: 'AT+CTM2MINIT="{{ctwing.host}}",{{ctwing.port}},300,0'
    timeout: 1.2
    assert:
      - { name: err2参数数量错误, matches: '^\r\n\+CTM2M ERROR:2\r\n$' }

teardown:
  - command: 'AT+CTM2MINIT="{{init_ip}}",{{init_port}},{{init_life}},{{init_bm}},{{init_sm}}'
  - command: ATE0
    assert: { matches: '^\r\nOK\r\n$' }

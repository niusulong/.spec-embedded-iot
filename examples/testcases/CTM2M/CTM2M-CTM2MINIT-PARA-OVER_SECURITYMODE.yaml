# CTM2M-CTM2MINIT-PARA-OVER_SECURITYMODE.yaml
# 指令: AT+CTM2MINIT=<Sever_IP>,<Port>,<lifetime>,<Binding Mode>,<Securitymode>  (文档 14.2)
# 测试点：Securitymode 越上限（=3，文档仅定义 0/1/2）→ +CTM2M ERROR:5（<Securitymode> 不支持）。
# 注意：与普通参数越界返回 err3 不同，文档对 Securitymode 单独定义了 err5「不支持」。
# CTM2MINIT 掉电保存，setup extract 初始值，teardown 恢复。IP/Port 用 env 引用（合法上下文）。
name: CTM2MINIT-Securitymode越上限err5(严格字节级)
description: |
  场景前提：设备已上电、AT 口可用。CTM2MINIT 掉电保存，setup extract 初始值，teardown 恢复。
  验证目标：AT+CTM2MINIT 用 Securitymode=3（文档仅定义 0=NoSec/1=PSK_AES128_CCM_8/2=PSK_AES128_CBC_SHA256），
    其余参数合法，期望返回 <CR><LF>+CTM2M ERROR:5<CR><LF>（<Securitymode> 不支持）。
    注：文档对 Securitymode 不支持单列 err5，区别于普通参数值错误 err3。
    +CTM2M ERROR 是业务码，故步骤加 timeout 避免空等。
  文档依据：14.2 参数 <Securitymode> 取值 0/1/2；
    <err> 表 err=5「<Securitymode> 不支持」；响应格式 <CR><LF>+CTM2M ERROR:<err><CR><LF>（冒号后无空格）。
tags: [CTM2M, CTM2MINIT, PARA, p0]
port: COM5

setup:
  - command: ATE0
    assert: { matches: '^\r\nOK\r\n$' }
  # 14.2 AT+CTM2MINIT?  提取初始值用于恢复
  - command: AT+CTM2MINIT?
    extract:
      init_ip: '\+CTM2MINIT:"?((?:\d+\.){3}\d+)"?'
      init_port: '\+CTM2MINIT:[^,]*,\s*(\d+)'
      init_life: '\+CTM2MINIT:[^,]*,\s*\d+,(\d+)'
      init_bm: '\+CTM2MINIT:[^,]*,\s*\d+,\d+,(\d)'
      init_sm: '\+CTM2MINIT:[^,]*,\s*\d+,\d+,\d+,(\d)'
    assert: { contains: "OK" }

steps:
  # 14.2 AT+CTM2MINIT=  Securitymode=3 越上限（合法 IP/Port 用 env，lifetime/Binding 合法）
  - command: 'AT+CTM2MINIT="{{ctwing.host}}",{{ctwing.port}},300,0,3'
    timeout: 1.2
    assert:
      - { name: err5_Securitymode不支持, matches: '^\r\n\+CTM2M ERROR:5\r\n$' }

teardown:
  # 恢复初始值（{{var}} 模板替换，init_ip 取出的是裸 IP，手动加引号）
  - command: 'AT+CTM2MINIT="{{init_ip}}",{{init_port}},{{init_life}},{{init_bm}},{{init_sm}}'
  - command: ATE0
    assert: { matches: '^\r\nOK\r\n$' }

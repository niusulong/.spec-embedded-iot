# CTM2M-CTM2MSEND-PARA-LENGTH_OVER.yaml
# 指令: AT+CTM2MSEND=<Data>  (文档 14.6)
# 测试点：Data 长度超过上限（>1000 字符）→ +CTM2M ERROR:14（Data 字段长度超过上限）。
# 数据格式校验一般在指令受理阶段，不依赖登录态。
# 本用例用恰好 1002 个十六进制字符（501 字节，刚超 1000 上限）触发越限。
name: CTM2MSEND-数据长度超限err14(严格字节级)
description: |
  场景前提：设备已上电、AT 口可用。数据格式校验一般在指令受理阶段，不依赖登录态。
  验证目标：AT+CTM2MSEND=<1002个十六进制字符>（>1000 上限），期望返回
    <CR><LF>+CTM2M ERROR:14<CR><LF>（Data 字段长度超过上限）。
    注：+CTM2M ERROR 是业务码，故步骤加 timeout 避免空等。
    不确定性：若设备先校验登录态再校验数据长度，未登录时会先返回 err 4 而非 err 14。
    若实测返回 err 4，请改在已登录(state>=2)环境下运行本用例。
  文档依据：14.6 参数 <Data>「数据长度不能超过 1000」；
    <err> 表 err=14「Data 字段长度超过上限」。
tags: [CTM2M, CTM2MSEND, PARA, p0]
port: COM5

setup:
  - command: ATE0
    assert: { matches: '^\r\nOK\r\n$' }

steps:
  # 14.6 AT+CTM2MSEND=  恰好 1002 个十六进制字符（501 字节，刚超 1000 上限）
  - command: ''
    timeout: 1.2
    assert:
      - { name: err14长度超限, matches: '^\r\n\+CTM2M ERROR:14\r\n$' }

teardown:
  - command: ATE0
    assert: { matches: '^\r\nOK\r\n$' }

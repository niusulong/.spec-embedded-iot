# env.yaml 模板（skill 自带，全占位值）
#
# 复制本文件到目标工作区的 env 配置路径（配置文件 env_config 指向它，常见命名 env.yaml），
# 替换占位值为真实值。这是用例 {{group.param}} 引用的环境配置。
#
# 规则：
# - port 一律用引号字符串（'8080'），避免 YAML 把纯数字端口误解析
# - 敏感值（password/secret）用 <占位> 标注，真实值勿提交明文进版本库
# - 不需要的业务组可直接删除；需要的业务组按实际测试环境填真实值
# - 完整字段语义/章节出处见 references/env-params.md
#
# —— 本工作区增量说明（在官方模板基础上，仅改 CTM2M/LWM2M 实际用到的 ctwing.host/ctwing.port，
#    其余组保留官方占位值供后续功能块用例 {{group.param}} 引用）——
# CTM2M/LWM2M 特别说明：CTM2M 是 LWM2M/CoAP 协议（AT+CTM2MINIT 的 Sever_IP/Port），与 ctwing 组里
#   MQTT 语义的 product_id/device_name/device_secret 不同。当前 CTM2M 用例（Security=0 NoSec）只用
#   host/port，填 LWM2M 接入值；product_id/device_name/device_secret 为 MQTT 接入预留。

pdp:
  apn: cmnet
  pdp_type: IP
  cid: '1'
  auth_type: '1'
  auth_user: card
  auth_password: '<占位password>'

dns:
  dns1: 114.114.114.114
  dns2: 8.8.8.8
  query_domain: example.com

tcp:
  host: 192.168.1.100
  port: '8080'

tcp_server:
  listen_port: '6800'
  client_host: 192.168.1.50
  client_port: '50000'

ssl:
  host: 192.168.1.100
  port: '4451'
  sslversion: '3'
  authmode: '0'
  cacert: ca.pem
  client_cert: cc.pem
  client_key: ck.pem

http:
  host: 192.168.1.200
  port: '8080'
  url: 192.168.1.200/api/test
  base_url: /api
  https_url: example.com/secure/api
  https_port: '443'
  cacert: ca.pem

ftp:
  host: 192.168.1.100
  port: '21'
  user: testuser
  password: '<占位password>'
  path: /firmware
  filename: test.txt
  ftps_mode: '0'
  ftp_mode: '0'

ntp:
  host: time.windows.com
  port: '123'
  timeout: '10'
  timezone: E8

mqtt:
  host: broker.example.com:1883
  port: '1883'
  client_id: atprobe_test_01
  username: atprobe_user
  password: '<占位password>'
  topic: atprobe/cmd
  keep_alive: '60'

aliyun:
  srv_url: iot-cn-example.mqtt.iothub.aliyuncs.com
  product_key: a1Example01
  device_name: device001
  device_secret: '<占位secret32>'
  auth_mode: '0'
  keep_alive: '120'

aws:
  endpoint: a1example.iot.us-east-2.amazonaws.com:443
  client_id: atprobe_aws_01
  topic: nwy_test/01
  keep_alive: '60'
  ca_cert: ca.pem
  client_cert: cc.pem
  client_key: ck.pem

ctwing:
  host: 221.229.214.202        # CTM2M/LWM2M 实际接入值（官方模板占位 mqtt.ctwing.cn，本工作区按 LWM2M 改）
  port: '5683'                 # CTM2M/LWM2M CoAP 端口（官方模板占位 '1883' MQTT，本工作区按 LWM2M 改）
  product_id: '00000000'
  device_name: device001
  device_secret: '<占位secret>'

pipecloud:
  server_url: iot.example.com
  server_port: '1883'

fota:
  version_a: V1.0.0
  version_b: V2.0.0
  http_url: fota.example.com/http/fota.bin
  http_port: '80'
  https_url: fota.example.com/https/fota.bin
  https_port: '443'
  pkg_ab: fota_V1_to_V2.bin
  pkg_ba: fota_V2_to_V1.bin

sms:
  sca: '+8613800755500'
  dest_number: '13800138000'

netshare:
  apn: ctnet
  username: card
  password: '<占位password>'
  auth_type: '1'
  share_mode: '0'

default:
  apn: cmnet

device:
  model: N58
  test_number: '13800138000'
  imei: '000000000000000'
  software_version: V1.0.0
